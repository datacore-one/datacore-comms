manifest_version: 2
name: comms
version: 2.0.0
description: |
  Communications infrastructure — brand, content, scheduling, engagement, landing pages, ads, and analytics.
  Absorbed: datacore-campaigns (landing, ads, analytics workflows).

author: datacore
license: MIT
repository: https://github.com/datacore-one/datacore-comms

dependencies:
  - core@>=1.0.0

requires:
  env_vars:
    required: []
    optional:
      # Social Posting (Tweepy/X API)
      - X_CONSUMER_KEY
      - X_CONSUMER_SECRET
      - X_ACCESS_TOKEN
      - X_ACCESS_TOKEN_SECRET
      - X_BEARER_TOKEN
      # Engagement Pipeline
      - XAI_API_KEY              # x.ai API for conversation discovery
      - ENGAGEMENT_CHAT_ID       # Telegram chat ID for approval notifications
      # Ads
      - X_ADS_BEARER_TOKEN       # X Ads API
      - X_ADS_ACCOUNT_ID         # X Ads account ID
      # Analytics (Landing Pages)
      - POSTHOG_API_KEY          # PostHog personal API key
      - POSTHOG_PROJECT_KEY      # PostHog project key (phc_...)
      - POSTHOG_PROJECT_ID       # PostHog project ID
      # Channels (Web3)
      - TELEGRAM_BOT_TOKEN       # Telegram Bot API for channel posting
      - NEYNAR_API_KEY           # Neynar API for Farcaster posting
      - DISCORD_WEBHOOK_URL      # Discord webhook for channel posting
      # Blog
      - MEDIUM_TOKEN             # Medium API for blog cross-posting

provides:
  tools:
    - name: engagement_status
      description: "Engagement pipeline status — pending, posted, limits"
      handler: tools/index.js
    - name: engagement_queue
      description: "List pending engagement drafts awaiting approval"
      handler: tools/index.js
    - name: engagement_history
      description: "Recent posted engagement replies"
      handler: tools/index.js

  commands:
    # Planning
    - name: campaign-plan
      description: Create/update quarterly campaign strategy
    - name: monthly-plan
      description: Generate monthly content calendar from strategy
    - name: brand-positioning
      description: Create BrandScript, Tribe Profile, voice guidelines
    # Content
    - name: content-calendar
      description: Create monthly content calendar with post assignments
    - name: approve-content
      description: Review and approve pending content drafts
    # Scheduling
    - name: comms-status
      description: Dashboard showing scheduled, pending, posted counts
    # Engagement
    - name: engagement
      description: Run X engagement pipeline — discover, draft, notify via Telegram
    - name: engage
      description: Launch Chrome-based X feed engagement agent — likes, follows, reply drafts
    # Video
    - name: demo-video
      description: Demo video pipeline — screen recording to styled captions to X post via ffmpeg + Late.dev
    # Landing
    - name: landing
      description: Create or update landing pages for campaigns
    # Ads
    - name: ads
      description: Manage X Ads campaigns and review performance
    # Analytics
    - name: analytics
      description: Pull PostHog metrics and generate campaign reports

  agents:
    # Router
    - name: comms-executor
      trigger: ":AI:comms:"
      description: Router agent for all comms tasks
    # Positioning
    - name: brand-positioning-agent
      trigger: ":AI:comms:brand:"
      description: BrandScript, Tribe Profile, voice guidelines (StoryBrand + Tribal Marketing)
    # Planning
    - name: campaign-planner
      trigger: ":AI:comms:plan:"
      description: Quarterly strategies with goals, phases, audiences
    - name: content-planner
      trigger: ":AI:comms:calendar:"
      description: Monthly calendars, weekly themes, post assignments
    # Content
    - name: content-generator
      trigger: ":AI:comms:content:"
      description: Platform-specific content using matrix and viral patterns
    - name: voice-enforcer
      trigger: null
      description: Brand voice validation (called by content-generator)
    # Scheduling
    - name: calendar-manager
      trigger: ":AI:comms:publish:"
      description: Posting queue management and scheduling automation (X via Tweepy/nightshift)
    - name: web3-adapter
      trigger: ":AI:comms:adapt:"
      description: Cross-platform content adaptation (X → Farcaster, X → Telegram)
    # Landing
    - name: landing-generator
      trigger: ":AI:comms:landing:"
      description: Create and modify landing pages; hands off to dev for deployment
    # Ads
    - name: ads-optimizer
      trigger: ":AI:comms:ads:"
      description: X Ads management, A/B test analysis, budget optimization
    # Analytics
    - name: metrics-analyzer
      trigger: ":AI:comms:analytics:"
      description: PostHog metrics, conversion reports, campaign analytics

# Output locations (relative to space root)
outputs:
  drafts: "1-tracks/comms/campaigns/{quarter}/{month}/drafts/"
  approved: "1-tracks/comms/campaigns/{quarter}/{month}/approved/"
  posted: "1-tracks/comms/campaigns/{quarter}/{month}/posted/"
  reports: "1-tracks/comms/reports/"
  analytics: "1-tracks/comms/reports/{daily,weekly,ab-tests}/"

# Input locations (for context gathering)
inputs:
  positioning: "1-tracks/comms/positioning/"
  campaigns: "1-tracks/comms/campaigns/"
  knowledge: "3-knowledge/"
  zettels: "3-knowledge/zettel/"

settings:
  default_platforms:
    description: "Platforms to publish to by default"
    default:
      - twitter
      - linkedin
      - farcaster
      - telegram
      - discord

  content_matrix_types:
    description: "8 content types for variety"
    default:
      - actionable
      - motivational
      - analytical
      - contrarian
      - observation
      - comparison
      - future-focused
      - listicle

  posting_schedule:
    description: "Day-of-week content types (from viral playbook)"
    default:
      monday: kickoff_roast
      tuesday: educational
      wednesday: educational
      thursday: educational
      friday: community
      saturday: philosophical
      sunday: stats

  viral_checklist_threshold:
    description: "Minimum checklist score to publish (out of 9)"
    default: 7

  auto_post:
    description: "Auto-post without human approval"
    default: false

  human_approval_required:
    description: "Require human approval before posting"
    default: true

hooks:
  today: "commands/today-hook.md"
  nightshift_queue: "commands/nightshift-hook.md"

# DIP-0022 context
context:
  priority: on_match

# Engrams
engrams:
  namespace: comms
  scopes: [comms]
